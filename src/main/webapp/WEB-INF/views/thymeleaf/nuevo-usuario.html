<!DOCTYPE HTML>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

  <title>Taller Web I</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Rajdhani:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/register.css}" />
</head>

<body class="body-reg">
  <nav class="navbar navbar-expand-md fixed-top">
    <div class="container">
      <a class="navbar-brand" href="#">UNLAM</a>
      <a class="nav-link" th:href="@{/login}">Iniciar Sesión</a>
    </div>
  </nav>

  <main class="auth-container">
    <div class="auth-card">
      <form th:action="@{/registrarme}" method="POST" th:object="${datosRegistro}">
        <h1 class="auth-title">Crear Cuenta</h1>

        <p class="auth-subtitle">Registrate para comenzar</p>
        <hr class="colorgraph">

        <div class="form-grid">
          <div class="form-group">
            <label for="name" class="form-label">
              Nombre
            </label>
            <input th:field="*{name}" id="name" class="input-custom" placeholder="Ingresa tu nombre" required />
            <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></p>
          </div>
        </div>

        <div class="form-group">
          <label for="username" class="form-label">
            Nombre de Usuario
          </label>
          <input th:field="*{username}" id="username" class="input-custom" placeholder="Elige un username" required />
          <p th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></p>
        </div>

        <div class="form-group">
          <label for="gender" class="form-label">
            Género
          </label>
          <select th:field="*{gender}" id="gender" class="input-custom" required>
            <option value="">
              Seleccionar
            </option>
            <option value="MALE">
              Masculino
            </option>
            <option value="FEMALE">
              Femenino
            </option>
            <option value="OTHER">
              Otro
            </option>
          </select>
        </div>

        <div class="form-group">
          <label for="email" class="form-label">
            Email
          </label>
          <input th:field="*{email}" id="email" type="email" class="input-custom" placeholder="Ingresa tu email"
            required />
            <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label for="password" class="form-label">
              Contrasenia
            </label>
            <input th:field="*{password}" type="password" id="password" class="input-custom" placeholder="***"
              required />
            <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>  
          </div>

          <div class="form-group">
            <label for="confirmPass" class="form-label">
              Confirmar
            </label>
            <input th:field="*{confirmPassword}" type="password" id="confirmPass" class="input-custom"
              placeholder="****" required />
            <p th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></p>
          </div>
        </div>

        <div class="habits-grid">
          <label class="habit-card" th:each="habito : ${habitos}">
            <input type="checkbox" th:field="*{habitosSeleccionados}" th:value="${habito.id}" class="habit-checkbox" />
            <div class="habit-card-content">
              <div class="habit-info">
                <h3 class="habit-name" th:text="${habito.titulo}">
                </h3>
                <span class="habit-category" th:text="${habito.categoria.nombre}">
                </span>
              </div>
            </div>
          </label>
        </div>
        <button id="btn-registrarme" class="btn-neon" type="submit">
          Registrarme
        </button>

        <p th:if="${error != null}" class="alert-danger" th:text="'Error: ' + ${error}"></p>
      </form>
    </div>
  </main>

</body>

</html>
