<!DOCTYPE HTML>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

  <title>Taller Web I</title>

  <!-- Boostrap core css -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">

  <!-- custom style -->
  <link rel="stylesheet" th:href="@{/css/main.css}" />

</head>

<body>

  <nav class="navbar navbar-expand-md navbar-dark bg-dark fixed-top">
    <a class="navbar-brand" href="#">UNLAM</a>
  </nav>

  <main role="main" class="container">

    <div class="container">
      <div id="loginbox" style="margin-top:50px;" class="mainbox col-md-6 col-md-offset-3 col-sm-8 col-sm-offset-2">
        <form action="#" th:action="@{/registrarme}" method="POST" th:object="${usuario}">
          <h3 class="form-signin-heading">Nuevo Usuario</h3>
          <hr class="colorgraph"><br>

          <label for="name">Nombre</label>
          <input th:field="*{name}" id="name" class="form-control" required />
          <label for="surname">Apellido</label>
          <input th:field="*{surname}" id="surname" class="form-control" required />
          <label for="username">Nombre de Usuario</label>
          <input th:field="*{username}" id="username" class="form-control" required />
          <label for="gender">Género</label>
          <select th:field="*{gender}" id="gender" class="form-control" required>
            <option value="">Seleccionar</option>
            <option value="MALE">Masculino</option>
            <option value="FEMALE">Femenino</option>
            <option value="OTHER">Otro</option>
          </select>
          <label for="email">Email</label>
          <input th:field="*{email}" id="email" class="form-control" required />
          <label for="password">Contraseña</label>
          <input th:field="*{password}" type="password" id="password" class="form-control" required />
          <label for="confirmPass">Confirmar Contraseña</label>
          <input th:field="*{confirmPass}" type="password" id="confirmPass" class="form-control" required />

          <button id="btn-registrarme" class="btn btn-lg btn-primary btn-block" Type="Submit">Registrarme</button>
          <p th:if="${error != null}" class="alert alert-danger" th:text="'Error ' + ${error}">
          </p>
        </form>

      </div>
    </div>

  </main>
  <!-- /.container -->

  <!-- Boostrap core js -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
    crossorigin="anonymous"></script>

</body>

</html>
