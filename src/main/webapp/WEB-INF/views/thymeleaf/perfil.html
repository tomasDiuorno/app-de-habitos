<!DOCTYPE HTML>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

  <title>Taller Web I</title>

  <!-- Boostrap core css -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">

  <!-- custom style -->
  <link rel="stylesheet" th:href="@{/css/main.css}" />

</head>

<body>

  <nav class="navbar navbar-expand-md navbar-dark bg-dark fixed-top">
    <a class="navbar-brand" href="#">UNLAM</a>
  </nav>

  <main role="main" class="container">
    <div class="starter-template">

        <h1>Mi Perfil</h1>

        <hr>

        <div class="card p-4 shadow-sm">

            <div class="row">

                <div class="col-md-6 mb-3">
                    <label class="form-label">
                        <strong>Nombre</strong>
                    </label>

                    <div class="form-control">
                        <span th:text="${usuario.name}">
                        </span>
                    </div>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">
                        <strong>Apellido</strong>
                    </label>

                    <div class="form-control">
                        <span th:text="${usuario.surname}">
                        </span>
                    </div>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">
                        <strong>Usuario</strong>
                    </label>

                    <div class="form-control">
                        <span th:text="${usuario.username}">
                        </span>
                    </div>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">
                        <strong>Email</strong>
                    </label>

                    <div class="form-control">
                        <span th:text="${usuario.email}">
                        </span>
                    </div>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">
                        <strong>Género</strong>
                    </label>

                    <div class="form-control">
                        <span th:text="${usuario.gender}">
                        </span>
                    </div>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">
                        <strong>Estado</strong>
                    </label>

                    <div class="form-control">
                        <span th:text="${usuario.activo} ? 'Activo' : 'Inactivo'">
                        </span>
                    </div>
                </div>

            </div>

            <div class="mt-4">

                <a href="/home"
                   class="btn btn-secondary">
                    Volver
                </a>

                <a href="/editar-perfil"
                   class="btn btn-primary">
                    Editar Perfil
                </a>

            </div>

        </div>

    </div>

  </main>
  <!-- /.container -->

  <!-- Boostrap core js -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
    crossorigin="anonymous"></script>

</body>

</html>
