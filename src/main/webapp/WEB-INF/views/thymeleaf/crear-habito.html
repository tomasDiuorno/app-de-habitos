<!DOCTYPE HTML>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

  <title>Habitapp - Crear Hábito</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Rajdhani:wght@400;500;600;700&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" th:href="@{/css/crear-habito.css}" />
</head>

<body class="crear-habito-body">

  <div th:if="${mostrarLogro}" class="achievement-popup">
    <div class="achievement-icon">
      ★
    </div>

    <div class="achievement-content">
      <span class="achievement-label">Logro desbloqueado</span>
      <strong th:text="${tituloLogro}">
        Primer hábito creado
      </strong>
      <p th:text="${descripcionLogro}">
        Creaste tu primer hábito. Tu rutina acaba de empezar.
      </p>
    </div>
  </div>

  <nav class="crear-habito-navbar">
    <div class="crear-habito-navbar-container">

      <a th:href="@{/home}" class="crear-habito-brand">
        <img th:src="@{/images/logo.png}" alt="Logo Habitapp" class="crear-habito-logo">
      </a>

      <div class="crear-habito-nav-links">
        <a th:href="@{/home}" class="crear-habito-nav-link">Inicio</a>
        <a th:href="@{/habitos}" class="crear-habito-nav-link">Hábitos</a>
        <a th:href="@{/historial}" class="crear-habito-nav-link">Historial</a>
        <a th:href="@{/perfil}" class="crear-habito-nav-link">Perfil</a>
        <a th:href="@{/login}" class="crear-habito-logout-button">Cerrar sesión</a>
      </div>

    </div>
  </nav>

  <main class="crear-habito-main">

    <section class="crear-habito-card">
      <p class="section-kicker">Nuevo hábito</p>

      <h1>Crear hábito</h1>

      <p class="crear-habito-intro">
        Completá los datos para agregar un hábito personalizado a tu rutina.
      </p>

      <form th:action="@{/crear-habito}" method="POST" class="crear-habito-form" th:object="${datosRegistroHabito}">

        <div class="form-group">
          <label for="titulo">Nombre del hábito</label>
          <input type="text" id="titulo" th:field="*{titulo}" placeholder="Ej: Dormir temprano" required>
        </div>

        <div class="form-group">
          <label for="descripcion">Descripción</label>
          <textarea id="descripcion" th:field="*{descripcion}" placeholder="Ej: Acostarme antes de las 23 hs"
            required></textarea>
        </div>

        <div class="form-grid">
          <label for="descripcion">Tipo de habito</label>
          <div class="form-group">
            <select id="tipoHabito" th:field="*{tipoHabito}" required>
              <option value="">Seleccionar</option>
              <option value="CHECK">Completar</option>
              <option value="HORARIO">Horario</option>
              <option value="CANTIDAD">Cantidad</option>
              <option value="DURACION">Duración</option>
            </select>
          </div>

          <div class="form-grid">
            <label for="descripcion">Categoria</label>
            <div class="form-group">
              <select th:field="*{categoriaId}" required>
                <option value="">Seleccionar</option>
                <option th:each="categoria : ${categorias}" th:value="${categoria.id}" th:text="${categoria.nombre}">
                </option>
              </select>
            </div>

            <div class="form-group">
              <label for="frecuencia">Frecuencia</label>
              <select id="frecuencia" th:field="*{frecuencia}" required>

                <option value="">Seleccionar</option>
                <option value="Diaria">Diaria</option>
                <option value="Semanal">Semanal</option>
                <option value="Mensual">Mensual</option>
              </select>
            </div>
          </div>

          <div id="bloqueHorario" style="display:none">
            <label>Hora límite</label>
            <input type="time" th:field="*{horaLimite}">
          </div>
          
          <div id="bloqueCantidad" style="display:none">
            <label>Objetivo</label>
            <input type="number" th:field="*{objetivoNumerico}">
            <label>Unidad</label>
            <input type="text" th:field="*{unidadObjetivo}" placeholder="Ej: ml">
          </div>

          <div id="bloqueDuracion" style="display:none">
            <label>Minutos objetivo</label>
            <input type="number" th:field="*{objetivoNumerico}">
          </div>
          <p th:if="${error != null}" class="form-error" th:text="${error}">
          </p>
          
          <div class="form-group checkbox-group">
            <label for="compartirEnForo" style="display:flex; align-items:center; gap:10px;">
              <input type="checkbox" id="compartirEnForo" th:field="*{compartirEnForo}">
              Compartir como hábito grupal en el foro
            </label>
          </div>
          
          <div class="form-actions">
            <a th:href="@{/habitos}" class="button-secondary">
              Cancelar
            </a>

            <button type="submit" class="button-primary">
              Guardar hábito
            </button>
          </div>
        </div>
      </form>
    </section>

  </main>
  <script th:if="${mostrarLogro}" th:inline="javascript">
    setTimeout(function () {
      window.location.href = /*[[@{/habitos}]]*/ '/spring/habitos';
    }, 3500);
  </script>
  <script th:src="@{/js/tipoHabitos.js}"></script>

</body>

</html>
