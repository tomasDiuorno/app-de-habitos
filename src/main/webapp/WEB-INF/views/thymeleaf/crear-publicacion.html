<!DOCTYPE HTML>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

  <title>Habitapp - Crear publicación</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Rajdhani:wght@400;500;600;700&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" th:href="@{/css/comunidad.css}" />
</head>

<body class="comunidad-body">

  <nav class="comunidad-navbar">
    <div class="comunidad-navbar-container">

      <a th:href="@{/home}" class="comunidad-brand">
        <img th:src="@{/images/logo.png}" alt="Logo Habitapp" class="comunidad-logo">
      </a>

      <div class="comunidad-nav-links">
        <a th:href="@{/home}" class="comunidad-nav-link">Inicio</a>
        <a th:href="@{/recompensas}" class="comunidad-nav-link">Recompensas</a>
        <a th:href="@{/habitos}" class="comunidad-nav-link">Hábitos</a>
        <a th:href="@{/comunidad}" class="comunidad-nav-link active">Comunidad</a>
        <a th:href="@{/perfil}" class="comunidad-nav-link">Perfil</a>
        <a th:href="@{/login}" class="comunidad-logout-button">Cerrar sesión</a>
      </div>

    </div>
  </nav>

  <main class="comunidad-main">

    <section class="comunidad-hero">
      <p class="section-kicker">Nueva publicación</p>
      <h1>Crear publicación</h1>
      <p>Compartí una duda, consejo o experiencia con la comunidad.</p>
    </section>

    <section class="form-section">

      <form
        th:action="@{/comunidad/nueva}"
        th:object="${publicacionDTO}"
        method="post"
        class="comunidad-form">

        <p th:if="${error}" class="form-error" th:text="${error}">
          Error
        </p>

        <div class="form-group">
          <label for="titulo">Título</label>
          <input
            type="text"
            id="titulo"
            th:field="*{titulo}"
            placeholder="Ej: ¿Cómo ser más constante?">
        </div>

        <div class="form-group">
          <label for="contenido">Contenido</label>
          <textarea
            id="contenido"
            th:field="*{contenido}"
            rows="7"
            placeholder="Escribí tu publicación..."></textarea>
        </div>

        <div class="form-actions">
          <a th:href="@{/comunidad}" class="secondary-button">Cancelar</a>
          <button type="submit" class="primary-button">Publicar</button>
        </div>

      </form>

    </section>

  </main>

</body>

</html>
