<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Historial de Hábitos - Habit Tracker</title>
    <link rel="stylesheet" th:href="@{/css/habitos.css}" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="habitos-body">
    <header class="home-navbar">
      <div class="home-navbar-container">

        <a th:href="@{/home}" class="home-brand">
          <img th:src="@{/images/logo.png}" alt="Logo Habitapp" class="home-logo">
        </a>

        <nav class="home-nav-links">
          <a th:href="@{/habitos}" class="home-nav-link">Hábitos</a>
          <a th:href="@{/tienda}" class="home-nav-link">Tienda</a>
          <a th:href="@{/recompensas}" class="home-nav-link">Recompensas</a>
          <a th:href="@{/comunidad}" class="home-nav-link">Comunidad</a>
          <a th:href="@{/historial}" class="home-nav-link active">Historial</a>
          <a th:href="@{/perfil}" class="home-nav-link">Perfil</a>
          <a th:href="@{/login}" class="home-logout-button">Cerrar sesión</a>
        </nav>

      </div>
    </header>

    <main class="habitos-main-content">
      <section class="habitos-list-section">
        <h2>Registro de hábitos completados</h2>
        
        <div th:if="${#lists.isEmpty(historial)}">
          <p style="text-align: center; color: #666; margin-top: 2rem;">
            Aún no has completado ningún hábito. ¡Anímate a empezar hoy mismo!
          </p>
        </div>

        <div class="habitos-grid" th:unless="${#lists.isEmpty(historial)}">
          <article class="habit-card" th:each="registro : ${historial}">
            <div class="habit-card-header">
              <h3 th:text="${registro.habito.titulo}">Nombre del Hábito</h3>
              <span class="habit-category" th:text="${registro.habito.categoria.nombre}">
                Categoría
              </span>
            </div>
            
            <div class="habit-details">
              <p th:text="${registro.habito.descripcion}">Descripción del hábito.</p>
            </div>
            
            <div style="margin-top: 15px; padding: 10px; background-color: #e8f5e9; border-radius: 8px; text-align: center;">
              <span style="color: #2e7d32; font-weight: 600;">
                ¡Completado el <span th:text="${registro.fechaCompletado}">YYYY-MM-DD</span>!
              </span>
            </div>
          </article>
        </div>
      </section>
    </main>
  </body>
</html>
