<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Recompensas | Habit Quest</title>

    <link rel="stylesheet" th:href="@{/css/navbar.css}" />
    <link rel="stylesheet" th:href="@{/css/recompensas.css}" />
</head>

<body class="rewards-body">
    <div class="app-shell">
        <nav class="navbar">
            <a class="brand" th:href="@{/home}">
                <span class="brand-mark"></span>
                <span>Habit Quest</span>
            </a>

            <div class="nav-links">
                <a th:href="@{/home}">Inicio</a>
                <a th:href="@{/habitos}">Habitos</a>
                <a class="active" th:href="@{/recompensas}">Recompensas</a>
                <a th:href="@{/perfil}">Perfil</a>
            </div>

            <a class="nav-action" th:href="@{/login}">Salir</a>
        </nav>

        <main class="rewards-page">
            <header class="rewards-hero">
                <div class="hero-content">
                    <span class="eyebrow">Sistema de progreso</span>
                    <h1>Recompensas de disciplina</h1>
                </div>

                <aside class="level-panel">
                    <span class="level-label">Nivel actual</span>
                    <strong class="level-value" th:text="${usuario.nivelUsuario}">12</strong>

                    <div class="level-progress">
                        <div class="level-progress-fill"
                            th:style="'width:' + (${usuario.nivelUsuario} > 100 ? 100 : ${usuario.nivelUsuario}) + '%'">
                        </div>
                    </div>

                    <span class="level-caption">
                        <span th:text="${usuario.nivelUsuario}">12</span>/100 XP de progreso
                    </span>
                </aside>
            </header>

            <section class="rewards-grid">
                <article th:each="recompensa : ${recompensas}"
                    th:with="rarezaClass=${#strings.toLowerCase(recompensa.rareza.toString())}"
                    class="reward-card unlocked" th:classappend="${rarezaClass}">
                    <div class="reward-image-wrap">
                        <img class="reward-image" th:src="@{${recompensa.urlImg}}" th:alt="${recompensa.nombre}" />

                        <div class="reward-image-overlay"></div>

                        <span class="reward-status unlocked-status">
                            Desbloqueada
                        </span>
                    </div>
                    <div class="reward-content">
                        <div class="reward-meta">
                            <span class="rarity-badge" th:text="${recompensa.rareza}">
                                EPICO
                            </span>
                            <span class="level-required">
                                LVL
                                <strong th:text="${recompensa.nivelRequerido}">
                                    5
                                </strong>
                            </span>
                        </div>
                        <h3 th:text="${recompensa.nombre}">
                            Nombre recompensa
                        </h3>
                        <p th:text="${recompensa.descripcion}">
                            Descripción
                        </p>
                    </div>
                    <div class="reward-footer">
                        <div class="unlock-info">
                            <span class="status-dot"></span>
                            Logro obtenido
                        </div>
                    </div>
                </article>
            </section>
        </main>
    </div>
</body>

</html>
